<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="45%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#140608"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff1f1f" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ff1f1f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff1f1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1280" y2="0">
      <stop offset="0%" stop-color="#ff1f1f" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff1f1f" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff4d4d"/>
      <stop offset="80%" stop-color="#ff1f1f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff1f1f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff1f1f" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="1280" height="4" patternUnits="userSpaceOnUse">
      <rect width="1280" height="2" fill="#ffffff" fill-opacity="0.02"/>
    </pattern>
    <clipPath id="clip">
      <rect width="1280" height="360" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <rect width="1280" height="360" fill="url(#glow)"/>
    <rect width="1280" height="360" fill="url(#grid)"/>
    <rect width="1280" height="360" fill="url(#scan)"/>

    <!-- frame -->
    <rect x="24" y="24" width="1232" height="312" rx="4" fill="none" stroke="#ff1f1f" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="36" y="36" width="1208" height="288" rx="2" fill="none" stroke="#ff1f1f" stroke-opacity="0.08" stroke-width="1"/>

    <!-- top accent -->
    <rect x="0" y="0" width="1280" height="3" fill="url(#redLine)"/>
    <rect x="0" y="357" width="1280" height="3" fill="url(#redLine)"/>

    <!-- corner marks -->
    <path d="M48 72 H120 M48 72 V144" stroke="#ff1f1f" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M1232 72 H1160 M1232 72 V144" stroke="#ff1f1f" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M48 288 H120 M48 288 V216" stroke="#ff1f1f" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M1232 288 H1160 M1232 288 V216" stroke="#ff1f1f" stroke-opacity="0.55" stroke-width="2"/>

    <!-- glitch layers -->
    <text x="642" y="178" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="92" font-weight="700" fill="#00ffff" fill-opacity="0.12">SECRET-TOOLS</text>
    <text x="638" y="174" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="92" font-weight="700" fill="#ff1f1f" fill-opacity="0.18">SECRET-TOOLS</text>

    <!-- main title -->
    <text x="640" y="172" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="92" font-weight="700" fill="#ffffff" filter="url(#glowText)">SECRET-TOOLS</text>
    <text x="640" y="172" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="92" font-weight="700" fill="#ff1f1f" fill-opacity="0.35">SECRET-TOOLS</text>

    <!-- subtitle -->
    <text x="640" y="222" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="22" fill="#ff6b6b" letter-spacing="6">CLASSIFIED À VOID LAYER À ACCESS DENIED</text>

    <!-- status line -->
    <text x="640" y="262" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="16" fill="#8b949e" letter-spacing="2">root@classified:~# threat_level=MAXIMUM À star_the_repo</text>

    <!-- side labels -->
    <text x="88" y="186" font-family="Consolas, Monaco, monospace" font-size="13" fill="#ff1f1f" fill-opacity="0.7" letter-spacing="3">[SYS]</text>
    <text x="88" y="210" font-family="Consolas, Monaco, monospace" font-size="13" fill="#6e7681">ONLINE</text>
    <text x="1140" y="186" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#ff1f1f" fill-opacity="0.7" letter-spacing="3">[LVL]</text>
    <text x="1140" y="210" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#6e7681">ABOVE</text>

    <!-- progress bar -->
    <rect x="440" y="286" width="400" height="8" rx="4" fill="#16161c" stroke="#ff1f1f" stroke-opacity="0.25"/>
    <rect x="440" y="286" width="280" height="8" rx="4" fill="#ff1f1f"/>
    <text x="640" y="318" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#6e7681">forging power in silence êêêêêêêêææææææææ</text>
  </g>
</svg>
